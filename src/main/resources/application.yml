spring:
  application:
    name: mini-wsa
  profiles:
    # When SPRING_PROFILES_ACTIVE is not set, activate 'all' — every tier
    # (ingest, consumer, query, dev) runs in a single JVM. This is the
    # default for `docker compose up` and local development.
    #
    # In production each tier runs as its own deployment off this same JAR:
    #   SPRING_PROFILES_ACTIVE=ingest    → REST + Kafka producer only
    #   SPRING_PROFILES_ACTIVE=consumer  → Kafka consumer + enrichment only
    #   SPRING_PROFILES_ACTIVE=query     → /v1/stats, /v1/events/samples only
    # 'dev' is the generator endpoints; gate behind the dev profile in prod.
    default: all
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/miniwsa}
    username: ${SPRING_DATASOURCE_USERNAME:miniwsa}
    password: ${SPRING_DATASOURCE_PASSWORD:miniwsa}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    show-sql: false
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: mini-wsa-ingestion
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.akamai.miniwsa.domain
        spring.json.value.default.type: com.akamai.miniwsa.domain.SecurityEvent
    listener:
      ack-mode: manual
      concurrency: 3
  jackson:
    serialization:
      write-dates-as-timestamps: false

miniwsa:
  kafka:
    topic: security-events
  enrichment:
    repeat-offender-window-seconds: 600
    repeat-offender-threshold: 5
    repeat-offender-grace-seconds: 60
  stats:
    top-limit: 10
  samples:
    max-limit: 100
  generator:
    max-count: 10000
    scenarios-file: classpath:generator-scenarios.yml
    ingest-url: http://localhost:8080

server:
  port: 8080

logging:
  level:
    com.akamai.miniwsa: INFO
    org.springframework.kafka: WARN
